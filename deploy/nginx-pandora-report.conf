# Pandora Monthly Report — Nginx reverse proxy
#
# Letakkan di /etc/nginx/sites-available/pandora-report
# lalu symlink ke /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # Ganti dengan domain/IP Anda

    # Upload limit (untuk form POST dari UI)
    client_max_body_size 10m;

    # Logs
    access_log /var/log/nginx/pandora-report-access.log;
    error_log  /var/log/nginx/pandora-report-error.log;

    # Proxy semua request ke uvicorn (FastAPI)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout untuk generate report (bisa lama kalau banyak agent)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Static files (kalau ada frontend static assets nanti)
    # location /static/ {
    #     alias /opt/pandora-monthly-report/frontend/static/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Download endpoint — timeout lebih longgar
    location /api/report/download/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 300s;
    }
}
